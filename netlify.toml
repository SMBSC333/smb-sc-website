[build]
  command = "npm run build"
  publish = "public"

[build.environment]
  NODE_VERSION = "20"

# Redirect /admin to /admin/ (trailing slash required for index.html to load)
[[redirects]]
  from = "/admin"
  to = "/admin/"
  status = 301

# Old ROI-math page renamed — redirect any stray traffic to new slug
[[redirects]]
  from = "/why-4997"
  to = "/ai-leverage-points"
  status = 301

# WordPress sitemap leftovers — 410 Gone signals removal to Googlebot
[[redirects]]
  from = "/sitemap_index.xml"
  to = "/sitemap.xml"
  status = 410
  force = true

[[redirects]]
  from = "/page-sitemap.xml"
  to = "/sitemap.xml"
  status = 410
  force = true

[[redirects]]
  from = "/post-sitemap.xml"
  to = "/sitemap.xml"
  status = 410
  force = true

[[redirects]]
  from = "/wp-sitemap.xml"
  to = "/sitemap.xml"
  status = 410
  force = true

# Edge function handles all dynamic routes
# excludedPath ensures static assets + admin are served directly by Netlify CDN
# IMPORTANT: Added /.netlify/* to excludedPath to allow Identity/Functions to work
[[edge_functions]]
  path = "/*"
  function = "index"
  excludedPath = ["/static/*", "/admin", "/admin/*", "/*.html", "/*.ico", "/*.txt", "/*.xml", "/*.json", "/.netlify/*"]
